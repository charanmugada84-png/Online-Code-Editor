<html><head><meta http-equiv="Content-Type" content="text/html; charset=windows-1252">
  <title>Code Editor</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      padding: 0;
      background: #f4f4f4;
    }

    h1 {
      text-align: center;
      background: #333;
      color: white;
      padding: 10px;
    }

    .container {
      display: flex;
      gap: 10px;
      padding: 10px;
    }

    textarea {
      width: 33%;
      height: 250px;
      padding: 10px;
      font-size: 14px;
    }

    iframe {
      width: 100%;
      height: 300px;
      border: 1px solid black;
      background: white;
    }

    button {
      display: block;
      margin: 10px auto;
      padding: 10px 20px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h1>Online Code Editor</h1>

<div class="container">
  <textarea id="html" placeholder="HTML Code"></textarea>

  <textarea id="css" placeholder="CSS Code"></textarea>

  <textarea id="js" placeholder="JavaScript Code"></textarea>
</div>

<button onclick="runCode()">Run Code</button>

<iframe id="output" src="./Code Editor_files/saved_resource.html"></iframe>

<script>
  function runCode() {

    let html = document.getElementById("html").value;

    let css = "<style>" +
      document.getElementById("css").value +
      "</style>";

    let js = "<script>" +
      document.getElementById("js").value +
      "<\/script>";

    let output = document.getElementById("output");

    output.srcdoc = html + css + js;
  }
</script>



<script>
(function() {
  var ws = new WebSocket('ws://' + window.location.host + 
             '/jb-server-page?reloadMode=RELOAD_ON_SAVE&'+
             'referrer=' + encodeURIComponent(window.location.pathname));
  ws.onmessage = function (msg) {
      if (msg.data === 'reload') {
          window.location.reload();
      }
      if (msg.data.startsWith('update-css ')) {
          var messageId = msg.data.substring(11);
          var links = document.getElementsByTagName('link');
          for (var i = 0; i < links.length; i++) {
              var link = links[i];
              if (link.rel !== 'stylesheet') continue;
              var clonedLink = link.cloneNode(true);
              var newHref = link.href.replace(/(&|\?)jbUpdateLinksId=\d+/, "$1jbUpdateLinksId=" + messageId);
              if (newHref !== link.href) {
                clonedLink.href = newHref;
              }
              else {
                var indexOfQuest = newHref.indexOf('?');
                if (indexOfQuest >= 0) {
                  // to support ?foo#hash 
                  clonedLink.href = newHref.substring(0, indexOfQuest + 1) + 'jbUpdateLinksId=' + messageId + '&' + 
                                    newHref.substring(indexOfQuest + 1);
                }
                else {
                  clonedLink.href += '?' + 'jbUpdateLinksId=' + messageId;
                }
              }
              link.replaceWith(clonedLink);
          }
      }
  };
})();
</script></body></html>
